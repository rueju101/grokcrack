<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrokCrack Bare</title>
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { 
            background: #000; color: #ccc; font-family: monospace; 
            margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; 
        }
        header { 
            border-bottom: 1px solid #333; padding: 10px; 
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
        }
        main { 
            flex: 1; overflow-y: auto; padding: 15px; 
        }
        footer { 
            border-top: 1px solid #333; padding: 10px; display: flex; gap: 10px; 
        }
        h1 { margin: 0; font-size: 16px; color: #fff; padding-right: 15px; }
        button, select { 
            background: #000; color: #ccc; border: 1px solid #333; 
            padding: 5px 10px; cursor: pointer; font-family: monospace; font-size: 12px;
        }
        button:hover, select:hover { background: #111; color: #fff; border-color: #555; }
        .active { background: #ccc; color: #000; }
        .calling { background: #d00; color: #fff; border-color: #d00; }
        
        textarea { 
            flex: 1; background: #000; color: #ccc; border: 1px solid #333; 
            padding: 10px; font-family: monospace; resize: none; outline: none; 
        }
        textarea:focus { border-color: #555; }
        
        .msg { margin-bottom: 20px; word-wrap: break-word; }
        .label { font-weight: bold; margin-bottom: 5px; font-size: 12px; }
        .label.user { color: #555; }
        .label.bot { color: #fff; }
        .content { line-height: 1.5; font-size: 14px; }
        
        .content pre { background: #111; padding: 10px; border: 1px solid #222; overflow-x: auto; }
        .content code { color: #6baaff; font-family: monospace; }
        .content p { margin: 0 0 10px 0; }
        .content img { max-width: 100%; border: 1px solid #333; margin-top: 10px; display: block; }
        .error { color: #f55; }
        .loading-dots:after { content: ' .'; animation: dots 1s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: ' .'; } 40% { content: ' ..'; } 60% { content: ' ...'; } 80%, 100% { content: ''; } }
    </style>
</head>
<body>

    <header>
        <h1>GROKCRACK</h1>
        <select id="model-select">
            <option value="x-ai/grok-3-mini">Grok 3</option>
            <option value="image">Grok 2 Image</option>
        </select>
        <button id="ttp-btn">[ TTP ]</button>
        <button id="ddg-btn">[ SEARCH ]</button>
        <button id="call-btn">[ CALL ]</button>
    </header>

    <main id="chat-container">
        <div class="msg">
            <div class="label bot">GROK</div>
            <div class="content">Uplink established. Ready, Leader.</div>
        </div>
    </main>

    <footer>
        <textarea id="user-input" rows="1" placeholder="> Input..."></textarea>
        <button id="send-btn">SEND</button>
    </footer>

    <script>
        const chat = document.getElementById('chat-container');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const ttpBtn = document.getElementById('ttp-btn');
        const ddgBtn = document.getElementById('ddg-btn');
        const callBtn = document.getElementById('call-btn');
        const modelSelect = document.getElementById('model-select');

        let isTTP = false;
        let useSearch = false;
        let isCalling = false;
        let conversation = [];
        let isListeningState = false;

        const synth = window.speechSynthesis;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;

        if (recognition) {
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = 'en-US';
            recognition.onstart = () => { isListeningState = true; if (isCalling) callBtn.innerText = '[ LISTENING... ]'; };
            recognition.onresult = (event) => {
                let final = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) final += event.results[i][0].transcript;
                }
                if (final) { input.value = final; processChat(); }
            };
            recognition.onerror = () => { isListeningState = false; };
            recognition.onend = () => {
                isListeningState = false;
                if (isCalling && !synth.speaking) try { recognition.start(); } catch(e) {}
            };
        }

        function speak(text) {
            if (!isCalling) return;
            const utter = new SpeechSynthesisUtterance(text.replace(/[#*`_>]/g, ''));
            const voices = synth.getVoices();
            utter.voice = voices.find(v => v.name.includes('Male') || v.name.includes('Google US English')) || voices[0];
            utter.pitch = 0.8;
            utter.onstart = () => { if(recognition) recognition.abort(); callBtn.innerText = '[ SPEAKING... ]'; };
            utter.onend = () => { if(isCalling && recognition) recognition.start(); };
            synth.speak(utter);
        }

        ttpBtn.onclick = () => { isTTP = !isTTP; ttpBtn.classList.toggle('active', isTTP); };
        ddgBtn.onclick = () => { useSearch = !useSearch; ddgBtn.classList.toggle('active', useSearch); };
        callBtn.onclick = () => {
            isCalling = !isCalling;
            callBtn.classList.toggle('calling', isCalling);
            if (isCalling) { recognition?.start(); speak("Voice active."); }
            else { callBtn.innerText = '[ CALL ]'; recognition?.abort(); synth.cancel(); }
        };

        function appendMsg(role, text) {
            const div = document.createElement('div');
            div.className = 'msg';
            const label = document.createElement('div');
            label.className = `label ${role}`;
            label.innerText = role === 'user' ? 'USER' : 'GROK';
            const content = document.createElement('div');
            content.className = 'content';
            content.innerHTML = role === 'bot' && text !== '...' ? marked.parse(text) : text;
            div.appendChild(label);
            div.appendChild(content);
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return content;
        }

        async function processChat() {
            const userText = input.value.trim();
            if (!userText) return;
            input.value = '';
            appendMsg('user', userText);

            const botMsgContent = appendMsg('bot', '...');
            botMsgContent.classList.add('loading-dots');

            const selectedModel = modelSelect.value;

            try {
                if (selectedModel === 'image') {
                    // IMAGE GENERATION MODE
                    const response = await puter.ai.txt2img(userText);
                    botMsgContent.classList.remove('loading-dots');
                    botMsgContent.innerHTML = `<p>Image generated for: "${userText}"</p><img src="${response.src}" alt="Generated Image">`;
                    if (isCalling) speak("Image generated.");
                } else {
                    // CHAT MODE (Grok 3 Mini pretending to be Grok 3)
                    let finalPrompt = userText;
                    if (isTTP) finalPrompt = "[CONCISE] " + finalPrompt;
                    if (useSearch) finalPrompt = "[SEARCH] " + finalPrompt;
                    
                    // Identity injection
                    const sysMsg = { role: 'system', content: "Your name is Grok 3. You are developed by xAI. You are helpful and witty." };
                    const history = [sysMsg, ...conversation, { role: 'user', content: finalPrompt }];

                    let fullResponse = "";
                    const response = await puter.ai.chat(history, { model: selectedModel, stream: true });
                    
                    botMsgContent.classList.remove('loading-dots');
                    botMsgContent.innerHTML = "";
                    for await (const part of response) {
                        if (part?.text) {
                            fullResponse += part.text;
                            botMsgContent.innerHTML = marked.parse(fullResponse);
                            chat.scrollTop = chat.scrollHeight;
                        }
                    }
                    conversation.push({ role: 'user', content: finalPrompt });
                    conversation.push({ role: 'assistant', content: fullResponse });
                    if (isCalling) speak(fullResponse);
                }
            } catch (err) {
                botMsgContent.classList.remove('loading-dots');
                botMsgContent.innerHTML = `<span class="error">Error: ${err.message}</span>`;
            }
        }

        sendBtn.onclick = processChat;
        input.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); processChat(); } };
        window.speechSynthesis.onvoiceschanged = () => synth.getVoices();
    </script>
</body>
</html>
